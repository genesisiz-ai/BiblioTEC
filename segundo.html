<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital TEC - Segundo Básico</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Biblioteca Digital TEC</h1>
        <p>Revistas Digitales - Segundo Básico</p>
    </header>

    <main class="magazine-grid" id="grid-revistas">
        </main>

    <script>
        // Simulando la Base de Datos de las revistas de Segundo Básico
        const revistas = [
            {
                titulo: "Ciencias Naturales N° 1",
                descripcion: "Explorando los ecosistemas y el impacto del cambio climático en nuestra región. Incluye actividades interactivas.",
                imagen: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=400", // Imagen de muestra
                qr: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://genially.com", // QR dinámico de muestra
                urlGenially: "#",
                urlPdf: "#",
                urlVideo: "#"
            },
            {
                titulo: "Historia y Ciencias Sociales",
                descripcion: "Un viaje a través de las civilizaciones antiguas y sus legados culturales más importantes para la humanidad.",
                imagen: "https://images.unsplash.com/photo-1447069387593-a5de0862481e?auto=format&fit=crop&q=80&w=400",
                qr: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://genially.com",
                urlGenially: "#",
                urlPdf: "#",
                urlVideo: "#"
            },
            {
                titulo: "Tecnología e Innovación",
                descripcion: "Conceptos básicos de programación en bloques, robótica escolar y ciudadanía digital para el siglo XXI.",
                imagen: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=400",
                qr: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://genially.com",
                urlGenially: "#",
                urlPdf: "#",
                urlVideo: "#"
            }
        ];

        // Función para renderizar las Cards en el HTML
        function cargarRevistas() {
            const grid = document.getElementById('grid-revistas');
            grid.innerHTML = ''; // Limpiar contenedor

            revistas.forEach(revista => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <div class="card-header">
                        <img src="${revista.imagen}" alt="${revista.titulo}" class="card-img" loading="lazy">
                        <img src="${revista.qr}" alt="Código QR" class="qr-code" title="Agranda el QR pasando el mouse">
                    </div>
                    <div class="card-body">
                        <h2 class="card-title">${revista.titulo}</h2>
                        <p class="card-description">${revista.descripcion}</p>
                        
                        <div class="btn-group">
                            <a href="${revista.urlGenially}" class="btn btn-preview btn-full">
                                <span class="material-icons">visibility</span> Vista Previa
                            </a>
                            <a href="${revista.urlGenially}" class="btn btn-genially" target="_blank">
                                <span class="material-icons">flash_on</span> Ver Genially
                            </a>
                            <a href="${revista.urlPdf}" class="btn btn-pdf" download>
                                <span class="material-icons">picture_as_pdf</span> PDF
                            </a>
                            <a href="${revista.urlVideo}" class="btn btn-video" target="_blank">
                                <span class="material-icons">play_circle_filled</span> Ver Video
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Ejecutar al cargar la página
        document.addEventListener('DOMContentLoaded', cargarRevistas);
    </script>
</body>
</html>
